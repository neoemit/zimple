services:
  zimple-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: zimple-web:local
    container_name: zimple-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:${ZIMPLE_PORT:-8080}:8080"
    environment:
      ZIMPLE_BIND_ADDRESS: "127.0.0.1"
      ZIMPLE_PORT: "8080"
      ZIMPLE_OUTPUT_DIR: "${ZIMPLE_OUTPUT_DIR:-/tmp/zimple-web-output}"
      ZIMPLE_DATA_DIR: "/data"
      ZIMPLE_DOCKER_SOCKET: "/var/run/docker.sock"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "${ZIMPLE_OUTPUT_DIR:-/tmp/zimple-web-output}:${ZIMPLE_OUTPUT_DIR:-/tmp/zimple-web-output}"
      - "${ZIMPLE_DATA_DIR:-./.zimple-web-data}:/data"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/api/runtime-health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
