services:
  zimple-web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_ZIMPLE_API_BASE_URL: "${VITE_ZIMPLE_API_BASE_URL:-}"
    image: zimple-web:local
    container_name: zimple-web
    restart: unless-stopped
    ports:
      - "${ZIMPLE_PUBLISH_HOST:-127.0.0.1}:${ZIMPLE_PORT:-8000}:8000"
    environment:
      ZIMPLE_BIND_ADDRESS: "0.0.0.0"
      ZIMPLE_PORT: "8000"
      ZIMPLE_OUTPUT_DIR: "${ZIMPLE_OUTPUT_DIR:-/Users/thomas/Repos/zimple/bind}"
      ZIMPLE_DATA_DIR: "/data"
      ZIMPLE_DOCKER_SOCKET: "/var/run/docker.sock"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "${ZIMPLE_OUTPUT_DIR:-/Users/thomas/Repos/zimple/bind}:${ZIMPLE_OUTPUT_DIR:-/Users/thomas/Repos/zimple/bind}"
      - "${ZIMPLE_DATA_DIR:-./.zimple-web-data}:/data"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8000/api/runtime-health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
